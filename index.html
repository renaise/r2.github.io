<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renaise Kim</title>
<style>
  *{box-sizing:border-box;}
  body{margin:0;
    background-color:#3f9c7a;
    background-image:repeating-linear-gradient(135deg,#ffffff14 0 2px,transparent 2px 22px);
    font-family:Helvetica,Arial,sans-serif;color:#000;font-size:15px;line-height:1.45;}
  a{color:#0000ee;}
  .layout{display:flex;align-items:flex-start;gap:24px;padding:24px 16px;max-width:1100px;margin:0 auto;}

  aside{width:200px;flex:0 0 200px;}
  nav{background:#fff;padding:14px;}
  nav a{display:block;text-decoration:none;color:#000;margin:5px 0;}
  nav a.cur::before{content:"■ ";color:#e0532a;}
  nav a:hover{text-decoration:underline;}
  .credit{font-size:13px;margin-top:16px;background:#fff;padding:10px 14px;}

  main{flex:1;max-width:800px;}
  h1.title{display:inline;font-size:54px;font-weight:bold;line-height:1.05;
    background:#f3e600;padding:2px 6px;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
  .panel{background:#d8f3ff;padding:28px;margin-top:26px;}
  .panel h2{font-size:28px;line-height:1.3;margin:0 0 16px;}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;}
  .card{background:linear-gradient(180deg,#fff,#f3e600);padding:24px;min-height:120px;}
  .card a{font-size:26px;font-weight:bold;text-decoration:underline;}

  .bgform{background:#fff;padding:18px;margin-top:18px;}
  .bgform h3{margin:0 0 10px;font-size:16px;}
  .bgform label{display:block;font-size:12px;margin:8px 0 2px;}
  .bgform input{width:100%;padding:6px;border:1px solid #000;font-size:14px;}
  .bgform input[type=color]{height:36px;padding:2px;}
  .bgform button{margin-top:12px;background:#000;color:#fff;border:0;padding:9px 16px;cursor:pointer;font-size:14px;}
  .bgform .note{font-size:12px;color:#666;margin-top:8px;}

  @media(max-width:760px){.layout{flex-direction:column;}aside{width:100%;flex:none;}
    .cards{grid-template-columns:1fr;}h1.title{font-size:38px;}}
</style>
</head>
<body>
<div class="layout">
  <aside>
    <nav>
      <a href="#">Home</a>
      <a class="cur" href="#">Work</a>
      <a href="#">About</a>
      <a href="#">The Artifact Index</a>
      <a href="#">Contact</a>
    </nav>
    <div class="credit">Background changed by: <b id="bgby">Renaise</b></div>
  </aside>

  <main>
    <h1 class="title">WORK</h1>

    <div class="panel">
      <h2>Renaise Kim works across a nonprofit, a design studio, and a venture stack.</h2>
    </div>

    <div class="cards">
      <div class="card"><a href="#">Artifice NYC</a></div>
      <div class="card"><a href="#">Studio Artifice</a></div>
      <div class="card"><a href="#">Codex Foundry</a></div>
      <div class="card"><a href="#">Lettuce Cap</a></div>
    </div>

    <form class="bgform" id="bgform">
      <h3>Change the background</h3>
      <label>Your name</label>
      <input type="text" id="who" placeholder="Visitor" required>
      <label>Pick a color</label>
      <input type="color" id="color" value="#3f9c7a">
      <label>…or paste an image URL (https, optional)</label>
      <input type="url" id="img" placeholder="https://…">
      <button type="submit">Change it for everyone</button>
      <div class="note">This is global. Whatever you set, every visitor sees.</div>
    </form>
  </main>
</div>

<script>
  var API = "https://renaise-bg.polished-flower-1ec2.workers.dev/";
  function applyBg(s){
    if(s.img){ document.body.style.backgroundImage="url('"+s.img+"')";
      document.body.style.backgroundSize="cover"; }
    else { document.body.style.backgroundColor=s.color;
      document.body.style.backgroundImage="repeating-linear-gradient(135deg,#ffffff14 0 2px,transparent 2px 22px)"; }
    document.getElementById('bgby').textContent = s.who || "Anonymous";
  }
  fetch(API).then(r=>r.json()).then(applyBg).catch(()=>{});
  document.getElementById('bgform').addEventListener('submit',function(e){
    e.preventDefault();
    var s={ who:document.getElementById('who').value.trim()||"Anonymous",
      color:document.getElementById('color').value,
      img:document.getElementById('img').value.trim() };
    var btn=this.querySelector('button'); btn.textContent="Saving…"; btn.disabled=true;
    fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(s)})
      .then(r=>r.json()).then(function(rec){ applyBg(rec); btn.textContent="Changed!"; })
      .catch(function(){ btn.textContent="Failed — try again"; })
      .finally(function(){ btn.disabled=false; setTimeout(function(){btn.textContent="Change it for everyone";},2000); });
  });
</script>
</body>
</html>
