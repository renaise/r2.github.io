<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renaise · Showroom</title>
<style>
  :root {
    --frame: #060606; --line: rgba(255,255,255,0.24);
    --ink: #f4f4f4; --ink-2: rgba(244,244,244,0.78); --ink-3: rgba(244,244,244,0.5);
    --glass: rgba(255,255,255,0.12); --glass-hi: rgba(255,255,255,0.24); --accent: #c9a24a;
    --detail-bg: #3d3d3d;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --body: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --serif: 'Snell Roundhand', 'Apple Chancery', 'Brush Script MT', cursive;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--frame); }
  body { font-family: var(--body); -webkit-font-smoothing: antialiased; padding: 12px; height: 100vh; }
  ::selection { background: rgba(255,255,255,0.85); color: #1a1a1a; }

  .viewport { position: relative; width: 100%; height: 100%; border-radius: 16px; overflow-y: auto; overflow-x: hidden;
    background-color: #6b6b6b;
    background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1.4px);
    background-size: 27px 27px; background-position: 13px 13px; }
  .viewport::-webkit-scrollbar { width: 10px; }
  .viewport::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.25); border-radius: 8px; border: 3px solid transparent; background-clip: content-box; }

  /* ── Sticky topbar ───────────────────────────────── */
  .topbar { position: sticky; top: 0; z-index: 8; display: flex; justify-content: space-between; align-items: center;
    padding: 18px 28px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    background: linear-gradient(rgba(107,107,107,0.7), rgba(107,107,107,0)); }
  .toggle { display: inline-flex; align-items: center; height: 44px; background: var(--glass); border: 1px solid rgba(255,255,255,0.28);
    border-radius: 12px; padding: 4px; gap: 2px; box-sizing: border-box; }
  .toggle button { font-family: var(--body); font-size: 12px; letter-spacing: 0.16em; color: var(--ink-2);
    background: transparent; border: 0; border-radius: 9px; height: 100%; padding: 0 18px; cursor: pointer; transition: background .25s, color .25s; }
  .toggle button.active { background: var(--glass-hi); color: var(--ink); }
  .toggle button:hover:not(.active) { color: var(--ink); }
  .menu-orb { height: 44px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.24);
    background: var(--glass); cursor: pointer; display: grid; place-items: center;
    color: var(--ink-2); font-size: 15px; letter-spacing: 2px; padding: 0 16px; transition: background .2s, color .2s; }
  .menu-orb:hover { background: var(--glass-hi); color: #fff; }

  /* ── Hero ────────────────────────────────────────── */
  .hero { text-align: center; padding: 5vh 24px 1vh; }
  .hero .mark { font-family: var(--serif); font-size: clamp(72px, 12vw, 184px); line-height: 0.86; color: rgba(255,255,255,0.92); }
  .hero .tagline { font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--ink-2); margin-top: 10px; }

  /* ── Box section ─────────────────────────────────── */
  .box { padding: 4vh 4vw 2vh; scroll-margin-top: 70px; }
  .box-label { display: flex; align-items: baseline; gap: 16px; margin: 0 4px 24px; }
  .box-label .nm { font-family: var(--serif); font-size: clamp(34px, 5vw, 64px); color: rgba(255,255,255,0.55); line-height: 1; }
  .box-label .ct { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); }
  .box-label .ln { flex: 1; height: 1px; background: var(--line); }

  .xgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  .xcard { position: relative; cursor: pointer; border: 1px solid var(--line); border-radius: 6px; overflow: hidden;
    background: rgba(255,255,255,0.03); transition: transform .25s ease, background .25s ease, border-color .25s ease; }
  .xcard:hover { transform: translateY(-3px); background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.4); }
  .xcover { position: relative; aspect-ratio: 4/3; overflow: hidden; background: #1c1c1c; }
  .xbody { padding: 14px 16px 16px; }
  .xtop { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .xno { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--ink-3);
    border: 1px solid rgba(255,255,255,0.4); border-radius: 50%; width: 24px; height: 24px; display: grid; place-items: center; }
  .xyear { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--ink-3); }
  .xname { font-size: clamp(18px, 1.7vw, 24px); font-weight: 600; letter-spacing: -0.005em; text-transform: uppercase;
    color: var(--ink); margin: 0 0 4px; line-height: 1.05; }
  .xsub { font-family: var(--body); font-size: 13px; line-height: 1.35; color: var(--ink-3); margin: 0 0 12px; min-height: 35px; }
  .xtags { display: flex; flex-wrap: wrap; gap: 7px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-2); align-items: center; }
  .xtags .dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.6); }
  .xcard .soon { position: absolute; top: 12px; left: 12px; z-index: 3; font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; padding: 3px 7px; }

  /* generative cover */
  .gcover { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px 22px; }
  .gcover::before { content: ""; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.14) 1px, transparent 1.4px); background-size: 22px 22px; opacity: 0.55; }
  .gcover .gname { position: relative; font-family: var(--body); font-weight: 600; letter-spacing: -0.015em; line-height: 0.96; color: rgba(255,255,255,0.92); font-size: clamp(26px, 3vw, 44px); }
  .gcover .gmeta { position: relative; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-top: 9px; }
  .xcover img, .cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; }
  .tone-0 { background: linear-gradient(150deg, #201f1d, #36332d); }
  .tone-1 { background: linear-gradient(150deg, #12211a, #1f3a2d); }
  .tone-2 { background: linear-gradient(150deg, #241a12, #3a2a18); }
  .tone-3 { background: linear-gradient(150deg, #141a24, #1d2a3a); }
  .tone-4 { background: linear-gradient(150deg, #1f1420, #34203a); }
  .tone-5 { background: linear-gradient(150deg, #221f12, #39331c); }

  .colophon { text-align: center; padding: 6vh 24px 7vh; font-family: var(--body); font-size: 12px; letter-spacing: 0.04em; color: var(--ink-3); }
  .colophon a { color: var(--ink-2); }

  /* ── Sheet overlays (detail + profile) ───────────── */
  .sheet { position: fixed; inset: 12px; z-index: 30; border-radius: 16px; background: var(--detail-bg);
    font-family: var(--body); color: var(--ink); overflow-y: auto; opacity: 0; visibility: hidden; transition: opacity .3s ease; }
  .sheet.open { opacity: 1; visibility: visible; }
  .sheet-bar { position: sticky; top: 0; z-index: 2; display: flex; justify-content: space-between; align-items: center;
    padding: 22px 40px; background: linear-gradient(var(--detail-bg) 70%, transparent); }
  .back { font-family: var(--body); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-2);
    background: var(--glass); border: 1px solid rgba(255,255,255,0.22); border-radius: 10px; padding: 9px 16px; cursor: pointer; transition: .2s; }
  .back:hover { color: #fff; background: var(--glass-hi); }
  .sheet-bar .idx { font-family: var(--body); font-size: 12px; letter-spacing: 0.08em; color: var(--ink-3); }

  .spec { max-width: 1180px; margin: 0 auto; padding: 8px 48px 64px; }
  .spec dl { display: grid; grid-template-columns: minmax(150px, 22%) 1fr; row-gap: 19px; column-gap: 32px; margin: 0; }
  .spec dt { font-size: 16px; color: var(--ink-3); font-weight: 400; align-self: start; }
  .spec dd { margin: 0; font-size: 16px; color: var(--ink); line-height: 1.28; max-width: 640px; }
  .spec dd.para { line-height: 1.5; color: rgba(244,244,244,0.92); }
  .spec dd.lg { min-height: 62px; }
  .spec dd a { color: inherit; text-decoration: underline; text-decoration-color: rgba(255,255,255,0.4); text-underline-offset: 3px; }
  .cover-label { font-size: 18px; color: var(--ink-3); margin: 40px 0 14px; }
  .cover { width: 100%; aspect-ratio: 16/9; border-radius: 4px; overflow: hidden; position: relative; background: #1c1c1c; }
  .cover .gcover { padding: 36px 40px; }
  .cover .gcover .gname { font-size: clamp(34px, 5vw, 68px); }

  .profile-body { max-width: 760px; margin: 0 auto; padding: 4vh 48px 64px; }
  .profile-mark { font-family: var(--mono); font-size: 22px; letter-spacing: 4px; color: var(--ink-3); }
  .profile-body h1 { font-family: var(--serif); font-size: clamp(54px, 8vw, 104px); font-weight: 400; margin: 6px 0 2px; line-height: 0.9; }
  .profile-body .role { font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-2); margin: 0 0 28px; }
  .profile-body .bio { font-size: 19px; line-height: 1.55; color: rgba(244,244,244,0.94); margin: 0 0 32px; max-width: 620px; }
  .profile-body .creds { list-style: none; margin: 0 0 32px; padding: 0; }
  .profile-body .creds li { display: grid; grid-template-columns: minmax(120px,30%) 1fr; gap: 24px; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.14); font-size: 15px; }
  .profile-body .creds li:last-child { border-bottom: 1px solid rgba(255,255,255,0.14); }
  .profile-body .creds .k { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); }
  .profile-body .contact { display: flex; flex-wrap: wrap; gap: 10px; }
  .profile-body .contact a { font-family: var(--body); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink);
    text-decoration: none; border: 1px solid rgba(255,255,255,0.28); border-radius: 10px; padding: 10px 16px; transition: background .2s; }
  .profile-body .contact a:hover { background: var(--glass-hi); }

  @media (max-width: 900px) { .xgrid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .xgrid { grid-template-columns: 1fr; } .spec dl { grid-template-columns: 1fr; row-gap: 6px; }
    .spec dt { margin-top: 14px; } .spec { padding: 8px 24px 48px; } }
</style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="topbar">
      <div class="toggle" role="tablist" aria-label="jump to box">
        <button class="active" data-box="lab" role="tab">LAB</button>
        <button data-box="stage" role="tab">STAGE</button>
      </div>
      <button class="menu-orb" aria-label="profile" id="menuOrb">•••</button>
    </div>

    <header class="hero">
      <div class="mark">Renaise</div>
      <div class="tagline">Selected Work · Lab + Stage · 2026</div>
    </header>

    <main id="index">
      <section class="box" id="box-lab">
        <div class="box-label"><span class="nm">Lab</span><span class="ct" id="lab-ct"></span><span class="ln"></span></div>
        <div class="xgrid" id="lab-grid"></div>
      </section>
      <section class="box" id="box-stage">
        <div class="box-label"><span class="nm">Stage</span><span class="ct" id="stage-ct"></span><span class="ln"></span></div>
        <div class="xgrid" id="stage-grid"></div>
      </section>
      <div class="colophon">Renaise · Founding designer &amp; creative director · <a href="services.html">Services →</a></div>
    </main>

    <section class="sheet" id="detail" aria-hidden="true">
      <div class="sheet-bar"><button class="back" data-close>← Index</button><span class="idx" id="detailIdx"></span></div>
      <div class="spec" id="spec"></div>

    <section class="sheet" id="profile" aria-hidden="true">
      <div class="sheet-bar"><button class="back" data-close>← Index</button><span class="idx">···  Profile</span></div>
      <div class="profile-body" id="profileBody"></div>

<script>
  const PROFILE = {
    name: "Renaise", role: "Founding designer & creative director",
    bio: "I design the surfaces where people and AI meet: products, identities, and the systems around them. It started with Mythra, a protocol that let language models summon live websites before agents were a category. Every project since has worked the same problem in a different layer: keep complex, technical things legible to machines without losing the people they were made for.",
    creds: [
      ["Now", "Founder, Codex Foundry · Creative director, Artifice NYC"],
      ["Before", "First designer at Flora AI · Design at SOOT"],
      ["Fellowship", "2026 Onassis ONX Fellow"],
      ["Origin", "Mythra, a pre-agentic protocol that anticipated llms.txt"],
    ],
    contact: [
      ["Services", "services.html"], ["Studio", "https://studioartifice.com/"],
      ["Artifice", "https://artificenyc.org/"], ["Mythra", "https://mythra.vercel.app/"],
      ["Email", "mailto:jonathan@codexfoundry.com"],
    ],
  };

  const BOXES = {
    lab: { label: "Lab", items: [
      { slug:"mythra", name:"Mythra", year:"2022–23", tone:3,
        descriptor:"ai:// an AI-native layer over the World Wide Web",
        title:"ai://WorldWideWeb: summoning the web into chat",
        hook:"Letting language models summon live sites, before agents were a category.",
        client:"Self-authored · with Shovon Hasan", client_url:"https://mythra.vercel.app/",
        medium:"Protocol", timeline:"2022–23", role:"Co-Designer", services:["Strategy","Design"],
        context:"Mythra closed two gaps at once. Every website makes you learn its interface from scratch; every LLM can only hand back text. Mythra let a model turn a plain-language request into an HTTP call and pull the live website back, so you could use any site just by asking, without learning it.",
        outcome:"A protocol a site adopts in minutes. The author drops a /mythra.txt file at the root listing what the site can do (its endpoints, methods, and parameters) and any model can operate it with no custom integration, rendering the live, working page right inside the chat. The bet: models become the front door to the internet, and most online tasks flow through one shared, declared layer instead of a thousand separate interfaces. Built with Shovon Hasan in 2022–23, years before \"agents\" were a category, and close to the llms.txt standard the industry ships today.",
        cover:"covers/mythra.jpg" },
      { slug:"biota", name:"Biota", year:"2025–26", tone:1,
        descriptor:"Composable AI content for the camera-roll maximalist",
        hook:"Turning camera-roll chaos into one tap of magic.",
        client:"Codex Foundry", medium:"Mobile App", timeline:"Q4 2025 – 2026", role:"Founder / Designer",
        services:["Strategy","Brand","Design"],
        context:"Biota is an AI content app built in-house at Codex Foundry. It targets the \"Aesthetic Hoarder\": people with 10,000+ items in their camera roll and neither the skill nor the patience to edit and publish. The job: turn complex generative pipelines into something that feels like one tap of magic.",
        outcome:"A mobile-first app that hides the pipeline behind composable templates: pick an aesthetic, get a finished, publishable result. Built around the two most emotionally charged content ecosystems, pets and aesthetics, with a credit system and template marketplace as the growth engine.",
        cover:"covers/biota.jpg" },
      { slug:"artifice", name:"Artifice", year:"2024–26", tone:0,
        descriptor:"Science Fiction platform: shaping + linking",
        title:"Science Fiction Platform Shaping + Linking", hook:"Science Fiction Platform Shaping + Linking",
        client:"Artifice", client_url:"https://artificenyc.org/",
        medium:"Creative Direction", timeline:"2024 – 2026", role:"Designer", services:["Strategy","Brand","Design"],
        context:"Artifice is a cultural institution Renaise creative-directs, a 501(c)(3) building a structured, consented archive of creative practice. Its brand problem is unusual: it has to hold a sprawling, multi-author, always-growing body of work without flattening any of it. Artifice answers with a container-first method: the space is locked before any spatial creative is made, so the brand works as a frame that artifacts are placed into.",
        outcome:"An open-curatorial brand: an identity and a programming language to run it. Every cohort splits into WHITEBOX and BLACKBOX, six artifacts per box, staged live as Chapters and archived with full provenance in The Artifact Index. Identity, format, and index operate as one system; keeping a growing body of creative work legible and attributable as it scales toward the future.",
        cover:"covers/artifice.jpg" },
      { slug:"hieronymus", name:"Hieronymus", year:"2024", tone:5, forthcoming:true,
        descriptor:"The design ecosystem of flora + fauna",
        hook:"A design world after the Garden of Earthly Delights.",
        client:"Artifice", medium:"Brand System", timeline:"2024", role:"Creative Director", services:["Strategy","Brand","Design"],
        context:"A design ecosystem of flora and fauna built on Hieronymus Bosch's Garden of Earthly Delights, the living-systems world (mycelium, SCOBY, bio-fashion) that gave an Artifice chapter its spatial language: WHITEBOX as the Garden, BLACKBOX as the Inferno, held in communion.",
        cover:"covers/hieronymus.jpg" },
      { slug:"liquid-metal", name:"Liquid Metal", year:"2024–25", tone:4, forthcoming:true,
        descriptor:"See everything: metadata as a liquid-metal surface",
        hook:"Make a deep archive legible at a glance.",
        client:null, medium:"Website", timeline:"2024–25", role:"Designer", services:["Strategy","Brand","Design"],
        context:"A system rich in metadata but starved of a single view. Everything stored, nothing seeable. The experiment: turn a deep index into one fluid, scannable surface.",
        cover:"covers/liquid-metal.jpg" },
      { slug:"rememe", name:"Rememe", year:"2025", tone:4, forthcoming:true,
        descriptor:"Remixing memes on a composable canvas",
        hook:"A composable canvas for remix culture.",
        client:null, medium:"Website", timeline:"2025", role:"Designer", services:["Strategy","Brand","Design"],
        context:"Meme-making is fast, social, and iterative; the product needed a canvas that invited remixing without sacrificing the speed that makes the format work.",
        cover:"covers/rememe.jpg" },
    ]},
    stage: { label: "Stage", items: [
      { slug:"flora", name:"Flora", year:"2024", tone:5,
        descriptor:"A node canvas for image makers",
        title:"A node canvas for image makers",
        hook:"A node canvas for image makers.",
        client:"FLORA Genesis", medium:"Product", timeline:"2024", role:"Designer", services:["Strategy","Brand","Design"],
        context:"A node-based creative tool with AI at the center, and no map; no competitor to copy, no convention to break. The team had to know what it was before it could say what it did.",
        outcome:"Zero to one. I shaped the editor around the people making images rather than the ones wiring graphs; community models, generation, and curation on a single canvas that never assumes you can code.",
        cover:"covers/flora.png" },
      { slug:"industrial-lighting", name:"Aputure", year:"2025", tone:1,
        descriptor:"Global site for industrial cinematic lighting",
        title:"A global home for industrial light.",
        hook:"A global home for industrial light.",
        client:"Aputure", medium:"Website", timeline:"Q3 2024 – Q2 2025", role:"Designer", services:["Strategy","Brand","Design","Production"],
        context:"Aputure lights real productions, but the site still sold fixtures like hardware: spec-led, and identical across a dozen markets that each shoot, read, and buy differently. The direction had to catch up to the work; cinematic, not clinical.",
        outcome:"A dark, image-forward site where lighting reads as craft. Full-bleed product heroes, families browsable at a glance, benefit-led headlines over spec dumps, and on-set storytelling running alongside the catalog: one visual language that holds for a gaffer pricing a fixture and a DP reading a case study, in any market or language.",
        cover:"covers/industrial-lighting.png" },
      { slug:"osmosis", name:"Osmosis", year:"2025", tone:3,
        descriptor:"Identity for forward-deployed reinforcement learning",
        title:"An identity for intelligence that seeps in.",
        hook:"An identity for intelligence that seeps in.",
        client:"Osmosis", client_url:"https://osmosis.ai/", medium:"Identity + Website", timeline:"2025", role:"Designer", services:["Strategy","Identity","Design"],
        context:"Osmosis is forward-deployed reinforcement learning that builds task-specific models that beat the frontier foundation models at a fraction of the cost. But the category it lives in (post-training, GRPO, DAPO) reads as jargon to the teams who need it most, and the name's own idea, intelligence absorbed gradually through contact, wasn't yet carrying any weight. The identity had to make a deeply technical practice feel inevitable, not arcane.",
        outcome:"An identity built on the osmotic principle: intelligence that diffuses across a membrane and stays, rather than software that gets installed. A restrained, technical wordmark and type system that carries from a research note to an enterprise deck; a gradient-as-argument visual language where absorption is the whole story; and positioning that reframes RL from a black box into something that seeps into a company's own data and compounds.",
        cover:"covers/osmosis.png" },
      { slug:"lighthouse", name:"Lighthouse", year:"2026", tone:2,
        descriptor:"Immigration as a talent strategy",
        title:"Land Talent. Land Somewhere.",
        hook:"Land Talent. Land Somewhere.",
        client:"Lighthouse", medium:"Identity + Website", timeline:"Q1 2026", role:"Lead Designer", services:["Strategy","Brand","Design"],
        context:"Most immigration products sell relief from paperwork. Lighthouse sells the opposite end; immigration as how a company wins the people everyone else is chasing, American excellence pitched as a reason to come build the future here.",
        outcome:"I directed and designed the identity up from its 1.0; elevated, enterprise-grade, made to be bought by the HR leaders staffing global teams.",
        cover:"covers/lighthouse.png" },
      { slug:"sensitive-subjects", name:"Sensitive Subjects", year:"2026", tone:0,
        descriptor:"Identity + site for a studio of one",
        title:"Reframing brands at the unstable moment",
        hook:"Reframing brands at the unstable moment.",
        client:"Sensitive Subjects Studio by Alexa Sparacio", medium:"Identity + Website", timeline:"Q1 2026 – Ongoing", role:"Lead Designer", contributors:"Chakib Mazouni", services:["Strategy","Design"],
        context:"A consultancy for brands at their unstable moments; a launch, a reframe, an identity crisis, the move that defines a category, where the work is judgment before production. It runs as a studio of one that pulls together a different cast for every project.",
        outcome:"An identity, and a site is revelatory and is a mirror to; navigation built from radial dials in place of a menu bar, a layout that reshapes as you move through it. A mutable web for a studio whose shape changes with each client.",
        cover:"covers/sensitive-subjects.png" },
      { slug:"soot", name:"SOOT", year:"2024–25", tone:0,
        descriptor:"Self-organizing assets: Liquid Metal + the Z-index",
        title:"See Everything, Search Anything, Self-Organize",
        hook:"See Everything, Search Anything, Self-Organize.",
        client:"SOOT", client_url:"https://soot.com/", medium:"Product", timeline:"Q3 2024 – Q2 2025", role:"Lead Designer", contributors:"SOOT, UNNAMED, Two.much Studio", services:["Strategy","Design"],
        context:"Every hard drive is a graveyard of final_v3_REALLY.png. Assets that sort themselves were a category with no precedent; nobody had drawn the primitives yet.",
        outcome:"The primitive is Liquid Metal, a parts library loose enough to prototype any surface fast; the Z index, a way to stack interface in depth instead of pretending the screen is flat.",
        cover:"covers/soot.png" },
    ]},
  };

  const ORDER = {
    lab:   ["biota","liquid-metal","hieronymus","mythra","artifice","rememe"],
    stage: ["sensitive-subjects","lighthouse","osmosis","industrial-lighting","soot","flora"],
  };
  const ROMAN = ["","i","ii","iii","iv","v","vi","vii","viii","ix","x"];
  const roman = n => ROMAN[n] || String(n);
  const fmtNo = p => p.box === "stage" ? String(p.n).padStart(3, "0") : roman(p.n);
  const boxTotal = key => key === "stage" ? String(BOXES[key].items.length).padStart(3, "0") : roman(BOXES[key].items.length);
  Object.entries(BOXES).forEach(([key, box]) => {
    box.items.sort((a, b) => ORDER[key].indexOf(a.slug) - ORDER[key].indexOf(b.slug));
    box.items.forEach((p, i) => { p.box = key; p.boxLabel = box.label; p.n = i + 1; });
  });
  const ALL = [...BOXES.lab.items, ...BOXES.stage.items];

  const tags = list => list.map((t,i) => `${i ? '<span class="dot"></span>' : ''}<span>${t}</span>`).join("");
  function gcover(p) {
    return `<div class="gcover tone-${p.tone ?? 0}"><div class="gname">${p.name}</div><div class="gmeta">${p.medium} · ${p.year}</div></div>`;
  }
  function coverInner(p) {
    const img = p.cover ? `<img src="${p.cover}" alt="${p.name} cover" onerror="this.remove()">` : "";
    return gcover(p) + img;
  }

  function xcard(p) {
    return `<article class="xcard" data-slug="${p.slug}" tabindex="0">
      ${p.forthcoming ? '<span class="soon">◷ Forthcoming</span>' : ''}
      <div class="xcover">${coverInner(p)}</div>
      <div class="xbody">
        <div class="xtop"><span class="xno">${fmtNo(p)}</span><span class="xyear">${p.year}</span></div>
        <h3 class="xname">${p.name}</h3>
        <p class="xsub">${p.descriptor}</p>
        <div class="xtags">${tags(p.services)}</div>
      </div>
    </article>`;
  }
  function renderIndex() {
    document.getElementById("lab-ct").textContent = BOXES.lab.items.length + " Artifacts";
    document.getElementById("stage-ct").textContent = BOXES.stage.items.length + " Artifacts";
    document.getElementById("lab-grid").innerHTML = BOXES.lab.items.map(xcard).join("");
    document.getElementById("stage-grid").innerHTML = BOXES.stage.items.map(xcard).join("");
  }
  renderIndex();

  // ── Detail / Profile ──
  const viewport = document.getElementById("viewport");
  const detail = document.getElementById("detail");
  const profile = document.getElementById("profile");
  const spec = document.getElementById("spec");
  const detailIdx = document.getElementById("detailIdx");
  const profileBody = document.getElementById("profileBody");
  const row = (label, value, cls = "") => `<dt>${label}</dt><dd class="${cls}">${value}</dd>`;
  const clientCell = p => (!p.client)
    ? '<span style="opacity:.5">Confidential</span>'
    : (p.client_url ? `<a href="${p.client_url}" target="_blank" rel="noopener">${p.client}</a>` : p.client);
  function openDetail(slug) {
    const p = ALL.find(x => x.slug === slug);
    if (!p) return;
    closeAll();
    const dl = [
      row("No.", fmtNo(p)),
      row("Title", p.title || p.hook),
      row("Client", clientCell(p)),
      row("Medium", p.medium),
      row("Timeline", p.timeline),
      row("Role", p.role),
      ...(p.contributors ? [row("Contributors", p.contributors)] : []),
      row("Context", p.context || "–", "para lg"),
      row("Outcome", p.outcome || "–", "para lg"),
    ].join("");
    spec.innerHTML = `<dl>${dl}</dl><div class="cover-label">Cover</div><div class="cover">${coverInner(p)}</div>`;
    detailIdx.textContent = `${p.boxLabel} · ${fmtNo(p)} / ${boxTotal(p.box)}`;
    detail.classList.add("open"); detail.setAttribute("aria-hidden","false"); detail.scrollTop = 0;
    if (location.hash !== "#" + slug) history.replaceState(null, "", "#" + slug);
  }
  function openProfile() {
    closeAll();
    profileBody.innerHTML = `
      <div class="profile-mark">•••</div>
      <h1>${PROFILE.name}</h1><p class="role">${PROFILE.role}</p>
      <p class="bio">${PROFILE.bio}</p>
      <ul class="creds">${PROFILE.creds.map(([k,v]) => `<li><span class="k">${k}</span><span>${v}</span></li>`).join("")}</ul>
      <div class="contact">${PROFILE.contact.map(([k,u]) => `<a href="${u}" target="_blank" rel="noopener">${k} ↗</a>`).join("")}</div>`;
    profile.classList.add("open"); profile.setAttribute("aria-hidden","false"); profile.scrollTop = 0;
    if (location.hash !== "#profile") history.replaceState(null, "", "#profile");
  }
  function closeAll() { [detail, profile].forEach(s => { s.classList.remove("open"); s.setAttribute("aria-hidden","true"); }); }
  function closeToIndex() { closeAll(); if (location.hash) history.replaceState(null, "", location.pathname); }
  function syncFromHash() {
    const h = location.hash.replace(/^#/, "");
    if (h === "profile") return openProfile();
    if (ALL.some(x => x.slug === h)) openDetail(h);
  }

  // ── Toggle = scroll to section + scrollspy ──
  const tbtns = [...document.querySelectorAll(".toggle button")];
  function setActive(key) { tbtns.forEach(b => b.classList.toggle("active", b.dataset.box === key)); }
  tbtns.forEach(b => b.addEventListener("click", () => {
    const sec = document.getElementById("box-" + b.dataset.box);
    viewport.scrollTo({ top: sec.offsetTop - 60, behavior: "smooth" });
    setActive(b.dataset.box);
  }));
  viewport.addEventListener("scroll", () => {
    const stageTop = document.getElementById("box-stage").offsetTop - 120;
    setActive(viewport.scrollTop >= stageTop ? "stage" : "lab");
  });

  // ── Wire ──
  document.getElementById("index").addEventListener("click", e => { const c = e.target.closest(".xcard"); if (c) openDetail(c.dataset.slug); });
  document.getElementById("index").addEventListener("keydown", e => {
    const c = e.target.closest(".xcard");
    if (c && (e.key === "Enter" || e.key === " ")) { e.preventDefault(); openDetail(c.dataset.slug); }
  });
  document.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeToIndex));
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeToIndex(); });
  document.getElementById("menuOrb").addEventListener("click", openProfile);
  window.addEventListener("hashchange", syncFromHash);
  syncFromHash();
</script>
</body>
</html>
